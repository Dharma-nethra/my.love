<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>මගේ ආදරේ</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            background-image: radial-gradient(circle at center, #fff0f5 0%, #fce4ec 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Malgun Gothic', 'Iskoola Pota', sans-serif;
            overflow: hidden;
            text-align: center;
        }

        .card-container {
            background: rgba(255, 255, 255, 0.9);
            padding: 40px 30px;
            border-radius: 25px;
            border: 2px solid #f8bbd0;
            box-shadow: 0 15px 35px rgba(233, 30, 99, 0.15);
            max-width: 85%;
            width: 500px;
            z-index: 10;
            backdrop-filter: blur(15px);
            position: relative;
        }

        .card-container::before {
            content: '';
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            bottom: 10px;
            border: 1px dashed #f48fb1;
            border-radius: 20px;
            pointer-events: none;
        }

        .gif-container img {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            margin-bottom: 25px;
            object-fit: cover;
            border: 4px solid #fce4ec;
            box-shadow: 0 8px 20px rgba(233, 30, 99, 0.2);
            transition: opacity 0.5s ease-in-out;
        }

        .message-box {
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
        }

        h1 {
            color: #d81b60;
            font-size: 20px;
            line-height: 1.8;
            font-weight: normal;
            margin: 0;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.05);
        }

        .heart-button {
            background: linear-gradient(45deg, #ff4081, #f50057);
            color: white;
            border: none;
            width: 100px;
            height: 100px;
            font-size: 22px;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(245, 0, 87, 0.4);
            transition: transform 0.3s, box-shadow 0.3s;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            position: relative;
            animation: pulse 2s infinite;
            font-family: inherit;
        }

        .heart-button::after {
            content: '❤️';
            font-size: 35px;
            position: absolute;
            opacity: 0.2;
        }

        .heart-button span {
            z-index: 1;
        }

        .heart-button:active {
            transform: scale(0.9);
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 8px 25px rgba(245, 0, 87, 0.4); }
            50% { transform: scale(1.05); box-shadow: 0 12px 30px rgba(245, 0, 87, 0.6); }
            100% { transform: scale(1); box-shadow: 0 8px 25px rgba(245, 0, 87, 0.4); }
        }

        .floating-hearts {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .f-heart {
            position: absolute;
            bottom: -50px;
            color: #f8bbd0;
            font-size: 20px;
            animation: floatUp infinite linear;
            opacity: 0;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.8) rotate(0deg); opacity: 0; }
            20% { opacity: 0.8; }
            100% { transform: translateY(-100vh) scale(1.2) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="soft-love-music.mp3" type="audio/mpeg">
    </audio>

    <div class="floating-hearts" id="heartsContainer"></div>

    <div class="card-container">
        <div class="gif-container">
            <img id="displayGif" src="https://media.giphy.com/media/l4pTdcifPZLpDjL1e/giphy.gif" alt="Romantic Gif">
        </div>
        
        <div class="message-box">
            <h1 id="messageText">මගෙන් ඔයාට ලස්සන තෑග්ගක් තියෙනවා. බලන්න ආසද?</h1>
        </div>

        <button class="heart-button" id="nextBtn" onclick="showNextMessage()">
            <span id="btnText">ආසයි</span>
        </button>
    </div>

    <script>
        const messages = [
            "මගේ මැණික් කැටේ, අපි කොතරම් දුරින් හිටියත් මගේ හිත හැමවෙලේම තියෙන්නේ ඔයා ළඟ. වෙලාවට කෑම ටික කාලා පරිස්සමෙන් ඉන්න ඕනි.",
            "රෑ වෙනකල් නිදාගන්නේ නැතුව ෆෝන් එක දිහා බලන් ඉන්න එපා. මගේ මැණික් කැටේගේ ඇස් දෙක පරිස්සම් කරගන්න එක මට ගොඩක් වටිනවා.",
            "මොන තරම් වැඩ තිබුණත් හිතේ සතුටින් ඉන්න උත්සාහ කරන්න. ඔයාගේ මානසික නිදහස තමයි මට හැමදේටම වඩා වටින්නේ.",
            "එළියට යද්දි වටපිට බලලා ගොඩක් පරිස්සමෙන් යන්න. මම ළඟ නැති අඩුව ඔයාට දැනෙන්න නොදී පරිස්සම් වෙන්න.",
            "වතුර බොන්න අමතක කරන්න එපා. මගේ මැණික් කැටේගේ සෞඛ්‍යය ගැන මම මෙහේ ඉඳන් ගොඩක් වද වෙනවා කියලා මතක තියාගන්න.",
            "කවුරු මොනවා කිව්වත් ඉක්මනට හිත රිදවගන්න එපා. ඔයාගේ හිනාවෙන මූණ දකින්නයි මම හැමදාම ආස.",
            "මහන්සි දැනෙනවා නම් වැඩ ටිකක් පැත්තකින් තියලා විවේක ගන්න. මගේ මැණික් කැටේ සනීපෙන් ඉන්න එකයි මට වැදගත්.",
            "උදේට නැගිට්ට ගමන් ලස්සන හිනාවකින් දවස පටන් ගන්න. ඒ හිනාව මගේ දවසත් ලස්සන කරනවා.",
            "හීතල දවස්වලට හොඳට උණුසුම් වෙලා ඉන්න. අසනීප හදාගත්තොත් මට මෙහේ ඉඳන් බලාගන්න බැරි වෙනවානෙ මගේ මැණික් කැටේ.",
            "ප්‍රශ්නයක් ආවම තනියම දුක් වෙන්න එපා. මම දුර හිටියත් මගේ මැණික් කැටේට ඇහුම්කන් දෙන්න හැමවෙලේම සූදානම්.",
            "කෑම කන එක මඟහරින්න එපා. ඔයා කෙට්ටු වෙනවට මම කොහොමත්ම කැමති නෑ මගේ මැණික් කැටේ.",
            "පාරේ පයින් යද්දි කල්පනාවෙන් යන්න. මගේ මැණික් කැටේට පොඩි තුවාලයක්වත් වෙනවට මම කැමති නෑ.",
            "නිතරම අනිත් අය ගැන හිතනවා වගේම ඔයා ගැනත් හිතන්න පුරුදු වෙන්න. ඔයා ඔයාටම ආදරේ කරන්න ඕනි.",
            "වැස්සේ තෙමෙන්න එහෙම එපා. හෙම්බිරිස්සාව හැදුනොත් මට තමා ගොඩක්ම දුක හිතෙන්නේ.",
            "තරහ ගියාම ඉක්මනට නිවෙන්න පුරුදු වෙන්න. මගේ ආදරේ හැමදාම මගේ මැණික් කැටේගේ හිත නිවන්න තියෙනවා.",
            "නිදාගන්න කලින් අද දවසේ වුණු හොඳ දේවල් ගැන විතරක් හිතන්න. සුන්දර හීන දකින්න මගේ මැණික් කැටේට.",
            "ඔයාගේ ලස්සන හීන වලට යන්න මහන්සි වෙන්න, හැබැයි ඒ ගමන් සෞඛ්‍යය ගැනත් හිතන්න අමතක කරන්න එපා.",
            "මම කතා කරන්න පරක්කු වුණොත් වැරදියට හිතන්න එපා. කොහේ හිටියත් මගේ හිත තියෙන්නේ මගේ මැණික් කැටේ ළඟ.",
            "අමාරු දේවල් තියෙනවා නම් මට කියන්න. අපි දෙන්නා එකතු වෙලා ඒ දේවල් විසඳගමු.",
            "නිතරම ෆෝන් එකට වෙලා ඉන්නෙ නැතුව පොතක් පතක් කියවලා හිත නිදහස් කරගන්න.",
            "කවුරුහරි ඔයාගේ හිත රිද්දුවොත් ඒක ගැනම හිත හිත ලතවෙන්න එපා. මම මගේ මැණික් කැටේට හැමදාම ආදරෙයි.",
            "කෑම හදද්දි පරිස්සමෙන්. අත පිච්චිලා එහෙම තියෙනවා දැක්කොත් මගෙන් හොඳවයින් අහගන්නවා.",
            "දවසට කීප සැරයක්වත් ලස්සනට හිනාවෙන්න. ඒ හිනාව තමයි මගේ ජීවිතේට තියෙන ලොකුම සැනසීම.",
            "කාත් එක්කවත් රණ්ඩු වෙන්න යන්න එපා. මගේ මැණික් කැටේ පාඩුවේ ඉන්න ඕනි හොඳද.",
            "ඔයාට බෑ කියලා හිතෙන වෙලාවට මාව මතක් කරගන්න. මගේ ආදරේ මගේ මැණික් කැටේට ලොකු හයියක් වේවි.",
            "හවසට ටිකක් එළියට බැහැලා නිදහස් හුළඟක් විඳින්න. මුළු දවසෙම කාමරේට වෙලා ඉන්න එපා.",
            "ඔයාගේ යාලුවොත් එක්කත් සතුටින් කාලය ගත කරන්න. මම ළඟ නැති අඩුව එයාලා පුරවාවි.",
            "මට මගේ මැණික් කැටේව ගොඩක් විශ්වාසයි. ඒ විශ්වාසය හැමදාම ඒ විදිහටම තියෙයි කියලා මම දන්නවා.",
            "අනාගතේ ගැන බය වෙන්න එපා. අපි කොහොමහරි අපේ ලස්සන ලෝකේ එකටම ගොඩනගමු.",
            "අසනීපයක් වුණ ගමන් බෙහෙත් ගන්න යන්න. පස්සට දාන්න එපා කිසිම දෙයක්.",
            "උදේට කෑම නොකා ඉඳලා ගැස්ට්‍රයිටිස් හදාගන්නවා එහෙම නෙවෙයි. මම ඒකට නම් ගොඩක් තරහ වෙනවා.",
            "මොන දේ වුණත් ඔයාගේ ඉලක්ක අතහරින්න එපා. මම හැමදාම මගේ මැණික් කැටේගේ පස්සෙන් ඉඳන් හයියක් වෙනවා.",
            "අඬන්න ඕනි වුණාම අඬන්න, හැබැයි කඳුළු පිහදාගෙන ආයෙත් හිනාවෙලා නැගිටින්න ඕනි මගේ මැණික් කැටේ.",
            "තනියම කොහේ හරි යද්දි මට කියල යන්න. එතකොට මගේ හිතට බයක් නෑ.",
            "ඔයාගේ ලස්සන කොණ්ඩේ පරිස්සම් කරගන්න. මම ආසයි ඒක දිහා බලන් ඉන්න.",
            "ගෙදර අයත් එක්කත් ආදරෙන් ඉන්න. එයාලා තමයි අපිට ඉන්න වටිනාම සම්පත.",
            "මගේ අඩුපාඩු තියෙනවා නම් මට කෙලින්ම කියන්න. අපි දෙන්නා කතා කරලා ඒවා හදාගමු.",
            "මගේ මැණික් කැටේගේ සතුට වෙනුවෙන් මම ඕනෑම දෙයක් කරන්න ලෑස්තියි. ඒ නිසා හැමදාම සතුටින් ඉන්න.",
            "නිදාගන්න යද්දි මාව මතක් කරලා තුරුළු කරගෙන නිදාගන්න. මගේ උණුසුම ඔයාට දැනේවි.",
            "ඔයාට කවුරු නැතත් මම හැමදාම ඉන්නවා කියන එක හිතේ තියාගන්න.",
            "පාරේ යන අහිංසක සතෙකුට කන්න ටිකක් දෙන්න. ඔයාගේ ඒ කරුණාවන්ත හිතට මම ගොඩක් ආදරෙයි.",
            "දවසම මහන්සි වෙලා ආවම උණු වතුර ටිකක් නාගන්න. එතකොට ඔයාගේ ඇඟට ලොකු සහනයක් දැනේවි.",
            "කිසිම දේකට ඉක්මන් තීරණ ගන්න එපා. හොඳට හිතලා බලලා වැඩ කරන්න පුරුදු වෙන්න.",
            "මගේ ජීවිතේට ලැබුණු ලොකුම වාසනාව මගේ මැණික් කැටේ. ඒ වාසනාව මම පණ වගේ රකිනවා.",
            "ඔයාගේ දුර්වලකම් ගැන හිතලා පසුතැවෙන්න එපා. අපි හැමෝම අතින් වැරදි වෙනවා.",
            "මම දෙන උපදෙස් වලට සමහර වෙලාවට ඔයාට කේන්ති යයි. ඒත් ඒ ඔක්කොම කරන්නේ ඔයාට තියෙන ආදරේ නිසයි.",
            "හැමදාම අලුත් දෙයක් ඉගෙන ගන්න උත්සාහ කරන්න. මගේ මැණික් කැටේගේ දියුණුව දකින්න මම ගොඩක් ආසයි.",
            "දුරින් හිටියත් අපේ හිත් දෙක එකට බැඳිලා තියෙන්නේ. ඒ බැඳීම කවදාවත් ලිහෙන්නේ නෑ.",
            "ඔයාගේ අත් දෙකෙන් අල්ලගෙන මේ ජීවන ගමන යන්න මම ගොඩක් ආසාවෙන් බලාගෙන ඉන්නවා.",
            "මගේ ආදරණීය මැණික් කැටේ, ඔයා පරිස්සමින් ඉන්න ඕනි. අපේ ලස්සන අනාගතය වෙනුවෙන් අපි දෙන්නම ශක්තිමත්ව ඉමු!"
        ];

        const gifs = [
            "https://media.giphy.com/media/l4pTdcifPZLpDjL1e/giphy.gif",
            "https://media.giphy.com/media/xT0xeQ9HQO8X23VbB6/giphy.gif",
            "https://media.giphy.com/media/26BRv0ThflsHCqDrG/giphy.gif",
            "https://media.giphy.com/media/3o7TKoWXm3okO1kgHC/giphy.gif"
        ];

        let currentIndex = -1;
        let musicStarted = false;

        function showNextMessage() {
            if (!musicStarted) {
                const audio = document.getElementById("bgMusic");
                audio.volume = 0.5; 
                audio.play().catch(e => console.log("Audio play prevented by browser"));
                musicStarted = true;
            }

            currentIndex++;

            if (currentIndex < messages.length) {
                const msgElement = document.getElementById("messageText");
                const gifElement = document.getElementById("displayGif");
                
                msgElement.style.opacity = 0;
                gifElement.style.opacity = 0;

                setTimeout(() => {
                    msgElement.innerText = messages[currentIndex];
                    document.getElementById("btnText").innerText = "තව ...";
                    
                    gifElement.src = gifs[currentIndex % gifs.length];
                    
                    msgElement.style.opacity = 1;
                    gifElement.style.opacity = 1;
                }, 300);

                createBackgroundHeart();
                createBackgroundHeart();
            } else {
                document.getElementById("messageText").innerText = "මම ඔයාට ගොඩක් ආදරෙයි මගේ මැණික් කැටේ! පරිස්සමින් ඉන්න! ❤️";
                document.getElementById("displayGif").src = "https://media.giphy.com/media/26BRv0ThflsHCqDrG/giphy.gif";
                document.getElementById("nextBtn").style.display = "none";
            }
        }

        function createBackgroundHeart() {
            const container = document.getElementById("heartsContainer");
            const heart = document.createElement("div");
            heart.innerHTML = "❤️";
            heart.classList.add("f-heart");
            heart.style.left = Math.random() * 100 + "vw";
            heart.style.animationDuration = (Math.random() * 5 + 5) + "s";
            heart.style.fontSize = (Math.random() * 15 + 10) + "px";
            container.appendChild(heart);
            
            setTimeout(() => {
                heart.remove();
            }, 10000);
        }

        setInterval(createBackgroundHeart, 1500);
    </script>
</body>
</html>
