<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>මගේ ආදරේ</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
    <style>
        :root {
            --rose:       #c2185b;
            --rose-light: #f48fb1;
            --rose-deep:  #880e4f;
            --gold:       #ffd700;
            --gold-light: #fff9c4;
            --cream:      #fff8f9;
            --glow:       rgba(194, 24, 91, 0.35);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Iskoola Pota', 'Malgun Gothic', sans-serif;
            overflow: hidden;
            background: #1a0010;
            cursor: default;
        }

        /* ─── Animated mesh background ─── */
        .bg-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                radial-gradient(ellipse 80% 60% at 20% 30%, #3d0028 0%, transparent 60%),
                radial-gradient(ellipse 60% 80% at 80% 70%, #2a0020 0%, transparent 60%),
                radial-gradient(ellipse 100% 100% at 50% 50%, #0d0008 0%, #1a0010 100%);
            animation: bgShift 12s ease-in-out infinite alternate;
        }
        @keyframes bgShift {
            0%   { filter: hue-rotate(0deg) brightness(1); }
            100% { filter: hue-rotate(15deg) brightness(1.15); }
        }

        /* ─── Grain overlay ─── */
        .grain {
            position: fixed;
            inset: 0;
            z-index: 1;
            opacity: 0.04;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            background-size: 150px;
            pointer-events: none;
        }

        /* ─── Petals canvas ─── */
        #petalCanvas {
            position: fixed;
            inset: 0;
            z-index: 2;
            pointer-events: none;
        }

        /* ─── Sparkle layer ─── */
        .sparkle-layer {
            position: fixed;
            inset: 0;
            z-index: 3;
            pointer-events: none;
        }
        .spark {
            position: absolute;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--gold);
            animation: sparkAnim linear infinite;
            opacity: 0;
        }
        @keyframes sparkAnim {
            0%   { transform: scale(0) rotate(0deg);   opacity: 0; }
            30%  { opacity: 1; }
            70%  { opacity: 0.6; }
            100% { transform: scale(1.5) rotate(180deg); opacity: 0; }
        }

        /* ─── Card wrapper ─── */
        .card-wrapper {
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Golden ring glow behind card */
        .card-glow {
            position: absolute;
            width: 340px;
            height: 460px;
            border-radius: 30px;
            background: conic-gradient(
                from 0deg,
                #ffd700, #c2185b, #ff4081, #ffd700, #c2185b, #ffd700
            );
            animation: rotateBorder 6s linear infinite;
            filter: blur(18px);
            opacity: 0.55;
            z-index: -1;
        }
        @keyframes rotateBorder {
            0%   { transform: rotate(0deg) scale(1.05); }
            100% { transform: rotate(360deg) scale(1.05); }
        }

        /* ─── Card ─── */
        .card {
            width: 340px;
            min-height: 460px;
            background: linear-gradient(160deg,
                rgba(255,248,249,0.13) 0%,
                rgba(255,220,230,0.08) 50%,
                rgba(194,24,91,0.05) 100%
            );
            backdrop-filter: blur(28px) saturate(1.4);
            -webkit-backdrop-filter: blur(28px) saturate(1.4);
            border: 1px solid rgba(255, 182, 193, 0.22);
            border-radius: 28px;
            padding: 38px 28px 34px;
            text-align: center;
            position: relative;
            overflow: hidden;
            box-shadow:
                0 0 0 1px rgba(255,215,0,0.12),
                0 30px 60px rgba(0,0,0,0.55),
                inset 0 1px 0 rgba(255,255,255,0.12);
        }

        /* Inner shimmer lines */
        .card::before {
            content: '';
            position: absolute;
            top: -60%;
            left: -60%;
            width: 220%;
            height: 220%;
            background: conic-gradient(
                from 90deg at 40% 40%,
                transparent 0deg,
                rgba(255,215,0,0.04) 60deg,
                transparent 120deg
            );
            animation: shimmerSpin 18s linear infinite;
            pointer-events: none;
        }
        @keyframes shimmerSpin {
            0%   { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Decorative corner ornaments */
        .card::after {
            content: '✦';
            position: absolute;
            top: 14px;
            right: 18px;
            font-size: 14px;
            color: rgba(255,215,0,0.4);
            animation: twinkle 3s ease-in-out infinite;
        }
        .corner-tl {
            position: absolute;
            top: 14px;
            left: 18px;
            font-size: 14px;
            color: rgba(255,215,0,0.4);
            animation: twinkle 3s ease-in-out infinite 1.5s;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50%       { opacity: 1;   transform: scale(1.3) rotate(30deg); }
        }

        /* ─── GIF image ─── */
        .gif-ring {
            position: relative;
            display: inline-block;
            margin-bottom: 22px;
        }
        /* Spinning golden ring */
        .gif-ring::before {
            content: '';
            position: absolute;
            inset: -5px;
            border-radius: 50%;
            background: conic-gradient(
                #ffd700 0deg, #ff4081 120deg, #c2185b 240deg, #ffd700 360deg
            );
            animation: ringRotate 4s linear infinite;
            z-index: -1;
        }
        @keyframes ringRotate {
            0%   { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        /* Soft glow behind image */
        .gif-ring::after {
            content: '';
            position: absolute;
            inset: -15px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(244,143,177,0.5) 0%, transparent 70%);
            animation: pulseGlow 2.5s ease-in-out infinite;
            z-index: -2;
        }
        @keyframes pulseGlow {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50%       { opacity: 1;   transform: scale(1.18); }
        }

        #displayGif {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #1a0010;
            display: block;
            transition: opacity 0.5s ease;
        }

        /* ─── Decorative divider ─── */
        .divider {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 0 auto 20px;
            width: 80%;
            opacity: 0.5;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(to right, transparent, #f48fb1, transparent);
        }
        .divider span { font-size: 12px; color: #f48fb1; }

        /* ─── Message ─── */
        .message-box {
            min-height: 110px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 26px;
            position: relative;
        }

        #messageText {
            color: #ffe0ec;
            font-size: 15.5px;
            line-height: 1.9;
            font-weight: 300;
            letter-spacing: 0.02em;
            transition: opacity 0.4s ease, transform 0.4s ease;
            text-shadow: 0 0 30px rgba(244,143,177,0.3);
        }
        #messageText.fade-out {
            opacity: 0;
            transform: translateY(8px);
        }
        #messageText.fade-in {
            opacity: 1;
            transform: translateY(0);
        }

        /* ─── Counter badge ─── */
        .counter {
            font-size: 11px;
            color: rgba(255,215,0,0.5);
            letter-spacing: 0.15em;
            margin-bottom: 20px;
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
        }

        /* ─── Heart Button ─── */
        .btn-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .heart-btn-wrap {
            position: relative;
            display: inline-block;
        }

        /* Orbiting dots */
        .orbit-ring {
            position: absolute;
            inset: -20px;
            border-radius: 50%;
            animation: orbitSpin 5s linear infinite;
            pointer-events: none;
        }
        @keyframes orbitSpin {
            0%   { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .orbit-dot {
            position: absolute;
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--gold);
            top: 50%;
            left: 50%;
            transform-origin: 0 0;
            animation: orbitDotPulse 2s ease-in-out infinite;
        }
        .orbit-dot:nth-child(1) { transform: rotate(0deg)   translateX(55px) translateY(-50%); }
        .orbit-dot:nth-child(2) { transform: rotate(120deg) translateX(55px) translateY(-50%); animation-delay: 0.66s; }
        .orbit-dot:nth-child(3) { transform: rotate(240deg) translateX(55px) translateY(-50%); animation-delay: 1.33s; }
        @keyframes orbitDotPulse {
            0%, 100% { opacity: 0.4; transform-origin: 0 0; }
            50%       { opacity: 1.0; }
        }

        .heart-button {
            position: relative;
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            background: linear-gradient(135deg, #ff6090, #c2185b, #880e4f);
            box-shadow:
                0 0 0 0 rgba(194,24,91,0.7),
                0 8px 30px rgba(194,24,91,0.5),
                inset 0 1px 0 rgba(255,255,255,0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
            font-family: 'Iskoola Pota', sans-serif;
            transition: transform 0.15s, box-shadow 0.3s;
            animation: heartPulse 2.2s ease-in-out infinite;
            z-index: 1;
        }
        @keyframes heartPulse {
            0%   { box-shadow: 0 0 0 0 rgba(194,24,91,0.7), 0 8px 30px rgba(194,24,91,0.5), inset 0 1px 0 rgba(255,255,255,0.2); }
            50%  { box-shadow: 0 0 0 14px rgba(194,24,91,0), 0 12px 40px rgba(194,24,91,0.65), inset 0 1px 0 rgba(255,255,255,0.2); }
            100% { box-shadow: 0 0 0 0 rgba(194,24,91,0), 0 8px 30px rgba(194,24,91,0.5), inset 0 1px 0 rgba(255,255,255,0.2); }
        }
        .heart-button:active {
            transform: scale(0.88);
        }

        .btn-emoji { font-size: 28px; line-height: 1; }
        .btn-label {
            font-size: 12px;
            color: rgba(255,255,255,0.9);
            letter-spacing: 0.05em;
            line-height: 1;
        }

        /* ─── Floating hearts layer ─── */
        #heartsContainer {
            position: fixed;
            inset: 0;
            z-index: 4;
            pointer-events: none;
            overflow: hidden;
        }

        .f-heart {
            position: absolute;
            bottom: -60px;
            opacity: 0;
            animation: floatUp linear forwards;
            filter: drop-shadow(0 0 4px rgba(244,143,177,0.8));
        }
        @keyframes floatUp {
            0%   { transform: translateY(0)      rotate(-20deg) scale(0.6); opacity: 0; }
            15%  { opacity: 0.9; }
            80%  { opacity: 0.6; }
            100% { transform: translateY(-105vh) rotate(40deg)  scale(1.3); opacity: 0; }
        }

        /* ─── Final message ─── */
        .final-msg {
            color: var(--gold);
            font-size: 17px;
            line-height: 2;
            text-shadow: 0 0 20px rgba(255,215,0,0.5);
            animation: finalGlow 2s ease-in-out infinite;
        }
        @keyframes finalGlow {
            0%, 100% { text-shadow: 0 0 20px rgba(255,215,0,0.4); }
            50%       { text-shadow: 0 0 40px rgba(255,215,0,0.9), 0 0 80px rgba(255,100,144,0.4); }
        }

        /* ─── Entry animation ─── */
        .card-wrapper { animation: cardEntry 1.2s cubic-bezier(0.34,1.56,0.64,1) both; }
        @keyframes cardEntry {
            0%   { opacity: 0; transform: scale(0.6) translateY(40px); }
            100% { opacity: 1; transform: scale(1)   translateY(0); }
        }
    </style>
</head>
<body>

<div class="bg-canvas"></div>
<div class="grain"></div>
<canvas id="petalCanvas"></canvas>
<div class="sparkle-layer" id="sparkleLayer"></div>
<div id="heartsContainer"></div>

<div class="card-wrapper">
    <div class="card-glow"></div>
    <div class="card">
        <span class="corner-tl">✦</span>

        <div class="gif-ring">
            <img id="displayGif"
                 src="https://media.giphy.com/media/l4pTdcifPZLpDjL1e/giphy.gif"
                 alt="Romantic Gif"
                 onerror="this.src='https://em-content.zobj.net/source/animated-noto-color-emoji/356/beating-heart_1f493.gif'">
        </div>

        <div class="divider"><span>❤</span></div>

        <div class="message-box">
            <p id="messageText" class="fade-in">
                මගෙන් ඔයාට ලස්සන තෑග්ගක් තියෙනවා. බලන්න ආසද?
            </p>
        </div>

        <div class="counter" id="counter"></div>

        <div class="btn-area" id="btnArea">
            <div class="heart-btn-wrap">
                <div class="orbit-ring">
                    <div class="orbit-dot"></div>
                    <div class="orbit-dot"></div>
                    <div class="orbit-dot"></div>
                </div>
                <button class="heart-button" id="nextBtn" onclick="showNextMessage()">
                    <span class="btn-emoji">❤️</span>
                    <span class="btn-label" id="btnText">ආසයි</span>
                </button>
            </div>
        </div>

    </div>
</div>

<audio id="bgMusic" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<script>
/* ═══════════════════════════════════════════
   DATA
═══════════════════════════════════════════ */
const messages = [
    "මගේ මැණික් කැටේ, අපි කොතරම් දුරින් හිටියත් මගේ හිත හැමවෙලේම තියෙන්නේ ඔයා ළඟ. වෙලාවට කෑම ටික කාලා පරිස්සමෙන් ඉන්න ඕනි.",
    "රෑ වෙනකල් නිදාගන්නේ නැතුව ෆෝන් එක දිහා බලන් ඉන්න එපා. මගේ මැණික් කැටේගේ ඇස් දෙක පරිස්සම් කරගන්න එක මට ගොඩක් වටිනවා.",
    "මොන තරම් වැඩ තිබුණත් හිතේ සතුටින් ඉන්න උත්සාහ කරන්න. ඔයාගේ මානසික නිදහස තමයි මට හැමදේටම වඩා වටින්නේ.",
    "එළියට යද්දි වටපිට බලලා ගොඩක් පරිස්සමෙන් යන්න. මම ළඟ නැති අඩුව ඔයාට දැනෙන්න නොදී පරිස්සම් වෙන්න.",
    "වතුර බොන්න අමතක කරන්න එපා. මගේ මැණික් කැටේගේ සෞඛ්‍යය ගැන මම මෙහේ ඉඳන් ගොඩක් වද වෙනවා කියලා මතක තියාගන්න.",
    "කවුරු මොනවා කිව්වත් ඉක්මනට හිත රිදවගන්න එපා. ඔයාගේ හිනාවෙන මූණ දකින්නයි මම හැමදාම ආස.",
    "මහන්සි දැනෙනවා නම් වැඩ ටිකක් පැත්තකින් තියලා විවේක ගන්න. මගේ මැණික් කැටේ සනීපෙන් ඉන්න එකයි මට වැදගත්.",
    "උදේට නැගිට්ට ගමන් ලස්සන හිනාවකින් දවස පටන් ගන්න. ඒ හිනාව මගේ දවසත් ලස්සන කරනවා.",
    "හීතල දවස්වලට හොඳට උණුසුම් වෙලා ඉන්න. අසනීප හදාගත්තොත් මට මෙහේ ඉඳන් බලාගන්න බැරි වෙනවානෙ මගේ මැණික් කැටේ.",
    "ප්‍රශ්නයක් ආවම තනියම දුක් වෙන්න එපා. මම දුර හිටියත් මගේ මැණික් කැටේට ඇහුම්කන් දෙන්න හැමවෙලේම සූදානම්.",
    "කෑම කන එක මඟහරින්න එපා. ඔයා කෙට්ටු වෙනවට මම කොහොමත්ම කැමති නෑ මගේ මැණික් කැටේ.",
    "පාරේ පයින් යද්දි කල්පනාවෙන් යන්න. මගේ මැණික් කැටේට පොඩි තුවාලයක්වත් වෙනවට මම කැමති නෑ.",
    "නිතරම අනිත් අය ගැන හිතනවා වගේම ඔයා ගැනත් හිතන්න පුරුදු වෙන්න. ඔයා ඔයාටම ආදරේ කරන්න ඕනි.",
    "වැස්සේ තෙමෙන්න එහෙම එපා. හෙම්බිරිස්සාව හැදුනොත් මට තමා ගොඩක්ම දුක හිතෙන්නේ.",
    "තරහ ගියාම ඉක්මනට නිවෙන්න පුරුදු වෙන්න. මගේ ආදරේ හැමදාම මගේ මැණික් කැටේගේ හිත නිවන්න තියෙනවා.",
    "නිදාගන්න කලින් අද දවසේ වුණු හොඳ දේවල් ගැන විතරක් හිතන්න. සුන්දර හීන දකින්න මගේ මැණික් කැටේට.",
    "ඔයාගේ ලස්සන හීන වලට යන්න මහන්සි වෙන්න, හැබැයි ඒ ගමන් සෞඛ්‍යය ගැනත් හිතන්න අමතක කරන්න එපා.",
    "මම කතා කරන්න පරක්කු වුණොත් වැරදියට හිතන්න එපා. කොහේ හිටියත් මගේ හිත තියෙන්නේ මගේ මැණික් කැටේ ළඟ.",
    "අමාරු දේවල් තියෙනවා නම් මට කියන්න. අපි දෙන්නා එකතු වෙලා ඒ දේවල් විසඳගමු.",
    "නිතරම ෆෝන් එකට වෙලා ඉන්නෙ නැතුව පොතක් පතක් කියවලා හිත නිදහස් කරගන්න.",
    "කවුරුහරි ඔයාගේ හිත රිද්දුවොත් ඒක ගැනම හිත හිත ලතවෙන්න එපා. මම මගේ මැණික් කැටේට හැමදාම ආදරෙයි.",
    "කෑම හදද්දි පරිස්සමෙන්. අත පිච්චිලා එහෙම තියෙනවා දැක්කොත් මගෙන් හොඳවයින් අහගන්නවා.",
    "දවසට කීප සැරයක්වත් ලස්සනට හිනාවෙන්න. ඒ හිනාව තමයි මගේ ජීවිතේට තියෙන ලොකුම සැනසීම.",
    "කාත් එක්කවත් රණ්ඩු වෙන්න යන්න එපා. මගේ මැණික් කැටේ පාඩුවේ ඉන්න ඕනි හොඳද.",
    "ඔයාට බෑ කියලා හිතෙන වෙලාවට මාව මතක් කරගන්න. මගේ ආදරේ මගේ මැණික් කැටේට ලොකු හයියක් වේවි.",
    "හවසට ටිකක් එළියට බැහැලා නිදහස් හුළඟක් විඳින්න. මුළු දවසෙම කාමරේට වෙලා ඉන්න එපා.",
    "ඔයාගේ යාලුවොත් එක්කත් සතුටින් කාලය ගත කරන්න. මම ළඟ නැති අඩුව එයාලා පුරවාවි.",
    "මට මගේ මැණික් කැටේව ගොඩක් විශ්වාසයි. ඒ විශ්වාසය හැමදාම ඒ විදිහටම තියෙයි කියලා මම දන්නවා.",
    "අනාගතේ ගැන බය වෙන්න එපා. අපි කොහොමහරි අපේ ලස්සන ලෝකේ එකටම ගොඩනගමු.",
    "අසනීපයක් වුණ ගමන් බෙහෙත් ගන්න යන්න. පස්සට දාන්න එපා කිසිම දෙයක්.",
    "උදේට කෑම නොකා ඉඳලා ගැස්ට්‍රයිටිස් හදාගන්නවා එහෙම නෙවෙයි. මම ඒකට නම් ගොඩක් තරහ වෙනවා.",
    "මොන දේ වුණත් ඔයාගේ ඉලක්ක අතහරින්න එපා. මම හැමදාම මගේ මැණික් කැටේගේ පස්සෙන් ඉඳන් හයියක් වෙනවා.",
    "අඬන්න ඕනි වුණාම අඬන්න, හැබැයි කඳුළු පිහදාගෙන ආයෙත් හිනාවෙලා නැගිටින්න ඕනි මගේ මැණික් කැටේ.",
    "තනියම කොහේ හරි යද්දි මට කියල යන්න. එතකොට මගේ හිතට බයක් නෑ.",
    "ඔයාගේ ලස්සන කොණ්ඩේ පරිස්සම් කරගන්න. මම ආසයි ඒක දිහා බලන් ඉන්න.",
    "ගෙදර අයත් එක්කත් ආදරෙන් ඉන්න. එයාලා තමයි අපිට ඉන්න වටිනාම සම්පත.",
    "මගේ අඩුපාඩු තියෙනවා නම් මට කෙලින්ම කියන්න. අපි දෙන්නා කතා කරලා ඒවා හදාගමු.",
    "මගේ මැණික් කැටේගේ සතුට වෙනුවෙන් මම ඕනෑම දෙයක් කරන්න ලෑස්තියි. ඒ නිසා හැමදාම සතුටින් ඉන්න.",
    "නිදාගන්න යද්දි මාව මතක් කරලා තුරුළු කරගෙන නිදාගන්න. මගේ උණුසුම ඔයාට දැනේවි.",
    "ඔයාට කවුරු නැතත් මම හැමදාම ඉන්නවා කියන එක හිතේ තියාගන්න.",
    "පාරේ යන අහිංසක සතෙකුට කන්න ටිකක් දෙන්න. ඔයාගේ ඒ කරුණාවන්ත හිතට මම ගොඩක් ආදරෙයි.",
    "දවසම මහන්සි වෙලා ආවම උණු වතුර ටිකක් නාගන්න. එතකොට ඔයාගේ ඇඟට ලොකු සහනයක් දැනේවි.",
    "කිසිම දේකට ඉක්මන් තීරණ ගන්න එපා. හොඳට හිතලා බලලා වැඩ කරන්න පුරුදු වෙන්න.",
    "මගේ ජීවිතේට ලැබුණු ලොකුම වාසනාව මගේ මැණික් කැටේ. ඒ වාසනාව මම පණ වගේ රකිනවා.",
    "ඔයාගේ දුර්වලකම් ගැන හිතලා පසුතැවෙන්න එපා. අපි හැමෝම අතින් වැරදි වෙනවා.",
    "මම දෙන උපදෙස් වලට සමහර වෙලාවට ඔයාට කේන්ති යයි. ඒත් ඒ ඔක්කොම කරන්නේ ඔයාට තියෙන ආදරේ නිසයි.",
    "හැමදාම අලුත් දෙයක් ඉගෙන ගන්න උත්සාහ කරන්න. මගේ මැණික් කැටේගේ දියුණුව දකින්න මම ගොඩක් ආසයි.",
    "දුරින් හිටියත් අපේ හිත් දෙක එකට බැඳිලා තියෙන්නේ. ඒ බැඳීම කවදාවත් ලිහෙන්නේ නෑ.",
    "ඔයාගේ අත් දෙකෙන් අල්ලගෙන මේ ජීවන ගමන යන්න මම ගොඩක් ආසාවෙන් බලාගෙන ඉන්නවා.",
    "මගේ ආදරණීය මැණික් කැටේ, ඔයා පරිස්සමින් ඉන්න ඕනි. අපේ ලස්සන අනාගතය වෙනුවෙන් අපි දෙන්නම ශක්තිමත්ව ඉමු!"
];

const gifs = [
    "https://media.giphy.com/media/l4pTdcifPZLpDjL1e/giphy.gif",
    "https://media.giphy.com/media/xT0xeQ9HQO8X23VbB6/giphy.gif",
    "https://media.giphy.com/media/26BRv0ThflsHCqDrG/giphy.gif",
    "https://media.giphy.com/media/3o7TKoWXm3okO1kgHC/giphy.gif"
];

const heartEmojis = ['❤️','💕','💖','💗','💓','🌹','✨','💝'];

/* ═══════════════════════════════════════════
   STATE
═══════════════════════════════════════════ */
let currentIndex = -1;
let musicStarted = false;
let heartsInterval = null;
let sparkInterval = null;

/* ═══════════════════════════════════════════
   ROSE PETAL CANVAS
═══════════════════════════════════════════ */
(function initPetals() {
    const canvas = document.getElementById('petalCanvas');
    const ctx    = canvas.getContext('2d');
    let W, H, petals = [];

    function resize() {
        W = canvas.width  = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    function Petal() {
        this.reset();
    }
    Petal.prototype.reset = function() {
        this.x    = Math.random() * W;
        this.y    = -30;
        this.r    = Math.random() * 8 + 5;
        this.vx   = (Math.random() - 0.5) * 1.2;
        this.vy   = Math.random() * 1.5 + 0.6;
        this.angle= Math.random() * Math.PI * 2;
        this.va   = (Math.random() - 0.5) * 0.04;
        this.alpha= Math.random() * 0.5 + 0.3;
        this.hue  = Math.random() * 40 + 320; // pink-red range
    };
    Petal.prototype.draw = function() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.angle);
        ctx.globalAlpha = this.alpha;
        ctx.beginPath();
        // leaf shape
        ctx.moveTo(0, 0);
        ctx.bezierCurveTo( this.r, -this.r,  this.r * 2,  this.r,     0,  this.r * 2.2);
        ctx.bezierCurveTo(-this.r * 2,  this.r, -this.r, -this.r,     0,  0);
        ctx.fillStyle = `hsl(${this.hue}, 80%, 72%)`;
        ctx.fill();
        ctx.restore();
    };
    Petal.prototype.update = function() {
        this.x     += this.vx;
        this.y     += this.vy;
        this.angle += this.va;
        if (this.y > H + 30) this.reset();
    };

    // seed initial petals
    for (let i = 0; i < 22; i++) {
        const p = new Petal();
        p.y = Math.random() * H; // spread on load
        petals.push(p);
    }

    function loop() {
        ctx.clearRect(0, 0, W, H);
        petals.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(loop);
    }
    loop();
})();

/* ═══════════════════════════════════════════
   GOLD SPARKLES
═══════════════════════════════════════════ */
function createSparkle() {
    const layer = document.getElementById('sparkleLayer');
    const s = document.createElement('div');
    s.className = 'spark';
    s.style.left   = Math.random() * 100 + 'vw';
    s.style.top    = Math.random() * 100 + 'vh';
    const dur  = Math.random() * 2000 + 1500;
    const size = Math.random() * 5 + 2;
    s.style.width  = size + 'px';
    s.style.height = size + 'px';
    s.style.animationDuration = dur + 'ms';
    s.style.animationDelay   = '0ms';
    layer.appendChild(s);
    setTimeout(() => s.remove(), dur + 100);
}

/* ═══════════════════════════════════════════
   FLOATING HEARTS
═══════════════════════════════════════════ */
function createHeart() {
    const container = document.getElementById('heartsContainer');
    const h = document.createElement('div');
    h.classList.add('f-heart');
    h.textContent = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
    h.style.left   = Math.random() * 100 + 'vw';
    const dur = Math.random() * 5000 + 6000;
    h.style.animationDuration = dur + 'ms';
    h.style.fontSize = (Math.random() * 16 + 12) + 'px';
    container.appendChild(h);
    setTimeout(() => h.remove(), dur + 100);
}

/* ═══════════════════════════════════════════
   CLICK BURST (heart explosion on click)
═══════════════════════════════════════════ */
document.addEventListener('click', function(e) {
    for (let i = 0; i < 6; i++) {
        const burst = document.createElement('div');
        burst.textContent = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
        burst.style.cssText = `
            position: fixed;
            left: ${e.clientX}px;
            top: ${e.clientY}px;
            font-size: ${Math.random() * 18 + 12}px;
            pointer-events: none;
            z-index: 999;
            animation: burstFly 0.8s ease-out forwards;
            --dx: ${(Math.random() - 0.5) * 120}px;
            --dy: ${-(Math.random() * 80 + 40)}px;
        `;
        document.body.appendChild(burst);
        setTimeout(() => burst.remove(), 900);
    }
});

// inject burst keyframes
const burstStyle = document.createElement('style');
burstStyle.textContent = `@keyframes burstFly {
    0%   { transform: translate(0,0) scale(1); opacity: 1; }
    100% { transform: translate(var(--dx), var(--dy)) scale(0.3); opacity: 0; }
}`;
document.head.appendChild(burstStyle);

/* ═══════════════════════════════════════════
   MAIN LOGIC
═══════════════════════════════════════════ */
function showNextMessage() {
    // Start ambient effects on first click
    if (!heartsInterval) {
        heartsInterval  = setInterval(createHeart, 1400);
        sparkInterval   = setInterval(createSparkle, 400);
    }

    // Music
    if (!musicStarted) {
        const audio = document.getElementById('bgMusic');
        audio.volume = 0.35;
        audio.play().catch(() => {});
        musicStarted = true;
    }

    currentIndex++;

    const msgEl  = document.getElementById('messageText');
    const gifEl  = document.getElementById('displayGif');
    const counter= document.getElementById('counter');

    // Fade out
    msgEl.classList.remove('fade-in');
    msgEl.classList.add('fade-out');
    gifEl.style.opacity = '0';

    setTimeout(() => {
        if (currentIndex < messages.length) {
            msgEl.textContent    = messages[currentIndex];
            gifEl.src            = gifs[currentIndex % gifs.length];
            document.getElementById('btnText').textContent = 'තව ...';
            counter.textContent  = `${currentIndex + 1} / ${messages.length}`;
        } else {
            // Final message
            msgEl.classList.add('final-msg');
            msgEl.textContent = 'මම ඔයාට ගොඩක් ආදරෙයි මගේ මැණික් කැටේ! පරිස්සමින් ඉන්න! ❤️';
            gifEl.src = 'https://media.giphy.com/media/26BRv0ThflsHCqDrG/giphy.gif';
            counter.textContent = '';
            document.getElementById('nextBtn').style.display = 'none';

            // Final burst of hearts
            for (let i = 0; i < 15; i++) {
                setTimeout(createHeart, i * 150);
            }
        }

        msgEl.classList.remove('fade-out');
        msgEl.classList.add('fade-in');
        gifEl.style.opacity = '1';

        // Extra hearts per click
        createHeart(); createHeart(); createHeart();

    }, 350);
}

// Idle sparkles from the start
setInterval(createSparkle, 700);
</script>
